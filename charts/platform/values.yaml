# global.* applies shared chart metadata and cluster defaults across the parent-managed resources.
global:
  # global.platformName sets app.kubernetes.io/part-of on parent-managed resources.
  platformName: todo-platform
  # global.storageClass is the default storage class for stateful components in this demo chart.
  storageClass: local-path
  imagePullSecrets: []
  labels: {}

# ingress.* configures the customer-facing route to the FastAPI Service.
ingress:
  # ingress.enabled controls whether the app Ingress is rendered.
  enabled: true
  # ingress.className selects the cluster ingress controller. Leave empty to use the cluster default.
  className: traefik
  # ingress.host must be set when ingress.enabled=true.
  host: todo.platform.local
  # ingress.path is the HTTP path routed to the app Service.
  path: /
  pathType: Prefix
  annotations: {}
  tls: []

# app.* configures the FastAPI Deployment, Service, and app-owned config/secret resources.
app:
  # app.name seeds the chart's app-facing names and labels.
  name: todo-api
  replicas: 1
  image:
    # app.image.repository and app.image.tag should point at an image built outside Helm.
    repository: platform/todo-api
    tag: dev
    # app.image.pullPolicy should be Never for locally imported images and pull-enabled for registry flows.
    pullPolicy: IfNotPresent
  containerPort: 8000
  service:
    # app.service.port is the Ingress-facing Service port.
    type: ClusterIP
    port: 80
  env:
    logLevel: info
    dbConnectTimeoutSeconds: 5
  # app.podAnnotations adds annotations to the FastAPI Pod template.
  podAnnotations: {}
  # app.podLabels adds extra labels to the FastAPI Pod template without changing selectors.
  podLabels: {}
  # app.podSecurityContext applies Pod-level security settings to the FastAPI workload.
  podSecurityContext: {}
  # app.securityContext applies container-level security settings to the FastAPI container.
  securityContext: {}
  # app.nodeSelector, app.tolerations, and app.affinity provide standard scheduling overrides.
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # app.extraEnv appends raw env entries to the FastAPI container.
  extraEnv: []
  # app.secretEnv renders extra key/value pairs into the chart-managed app Secret.
  secretEnv: {}
  secrets:
    # app.secrets.databasePassword copies an explicit DB password into the chart-managed app Secret.
    # Leave this empty to keep using the shared PostgreSQL secret path.
    databasePassword: ""
    existingSecret:
      # app.secrets.existingSecret lets the app read POSTGRES_PASSWORD from another Secret/key.
      # Use this only when that Secret contains the same application-user password PostgreSQL expects.
      name: ""
      key: ""
  # app.resources sizes the FastAPI container.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# postgresql.* mostly passes through to the Bitnami PostgreSQL subchart.
postgresql:
  enabled: true
  commonLabels:
    platform.example.io/component: postgresql
    platform.example.io/tier: workload
  image:
    registry: registry-1.docker.io
    repository: bitnami/postgresql
    # postgresql.image.tag stays on latest because the chart appVersion is not a guaranteed Docker tag.
    tag: latest
  architecture: standalone
  auth:
    enablePostgresUser: true
    # postgresql.auth.existingSecret points PostgreSQL at a pre-created Secret.
    # The chart also uses this as the default app DB password source unless app.secrets overrides it.
    existingSecret: ""
    # postgresql.auth.postgresPassword is the admin/superuser credential passed through to Bitnami.
    postgresPassword: ""
    # postgresql.auth.username and postgresql.auth.database define the shared app database identity.
    username: todoapp
    # postgresql.auth.password sets the shared app-user password when you are not using an existing Secret.
    password: ""
    database: todoapp
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 8Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    # postgresql.primary.extendedConfiguration enables pg_stat_statements and slow-query logging.
    # The PostgreSQL dashboard and Loki alert path both depend on these settings staying enabled.
    extendedConfiguration: |-
      shared_preload_libraries = 'pg_stat_statements'
      log_destination = 'stderr'
      logging_collector = off
      log_line_prefix = '%m [%p] db=%d,user=%u,app=%a,client=%h '
      log_min_duration_statement = 1000
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    customMetrics:
      pg_stat_statements_rollup:
        query: |
          SELECT
            current_database() AS datname,
            COALESCE(sum(calls), 0)::double precision AS calls_total,
            COALESCE(sum(total_exec_time), 0)::double precision / 1000.0 AS total_exec_time_seconds_total
          FROM pg_stat_statements;
        metrics:
          - datname:
              usage: LABEL
              description: Current database name
          - calls_total:
              usage: COUNTER
              description: Total SQL statements recorded by pg_stat_statements
          - total_exec_time_seconds_total:
              usage: COUNTER
              description: Total SQL execution time recorded by pg_stat_statements in seconds

# monitoring.* mostly passes through to kube-prometheus-stack, plus the parent chart's slow-query alert settings.
monitoring:
  enabled: true
  commonLabels:
    platform.example.io/component: monitoring
    platform.example.io/tier: observability
  defaultRules:
    create: true
  grafana:
    enabled: true
    defaultDashboardsEnabled: false
    # Subchart-local credential. If unset, upstream kube-prometheus-stack/Grafana behavior applies.
    adminPassword: ""
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
      datasources:
        enabled: true
        defaultDatasourceEnabled: true
        isDefaultDatasource: true
        name: Prometheus
        uid: prometheus
  alertmanager:
    enabled: true
  prometheus:
    prometheusSpec:
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
  slowQueryAlert:
    # monitoring.slowQueryAlert toggles the parent chart's Loki ruler rule for PostgreSQL slow-query logs.
    enabled: true
    # monitoring.slowQueryAlert.threshold counts matching log lines over the query window.
    threshold: 3
    # monitoring.slowQueryAlert.window is a simple LogQL range duration such as 10m or 1h.
    window: 10m
    # monitoring.slowQueryAlert.for is the alert hold time before firing.
    for: 0m

# loki.* mostly passes through to the Loki subchart.
loki:
  enabled: true
  commonLabels:
    platform.example.io/component: loki
    platform.example.io/tier: observability
  configObjectName: '{{ include "loki.fullname" . }}'
  generatedConfigObjectName: '{{ include "loki.fullname" . }}'
  deploymentMode: SingleBinary
  write:
    replicas: 0
  read:
    replicas: 0
  backend:
    replicas: 0
  gateway:
    enabled: false
  lokiCanary:
    enabled: false
  resultsCache:
    enabled: false
  chunksCache:
    enabled: false
  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    persistence:
      enabled: true
      storageClass: local-path
      size: 10Gi
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    rulerConfig:
      enable_api: true
      enable_alertmanager_v2: true
      alertmanager_url: http://{{ if contains "monitoring" .Release.Name }}{{ .Release.Name }}{{ else }}{{ printf "%s-monitoring" .Release.Name }}{{ end }}-alertmanager:9093
      rule_path: /tmp/loki/rules-temp
      storage:
        type: local
        local:
          directory: /rules
  ruler:
    enabled: true
  sidecar:
    rules:
      enabled: true
      label: loki_rule
      labelValue: "1"
      folder: /rules
      folderAnnotation: k8s-sidecar-target-directory
  test:
    enabled: false

# alloy.* mostly passes through to the Alloy subchart.
alloy:
  enabled: true
  controller:
    type: deployment
    replicas: 1
    extraLabels:
      platform.example.io/component: alloy
      platform.example.io/tier: observability
    podLabels:
      platform.example.io/component: alloy
      platform.example.io/tier: observability
  serviceMonitor:
    enabled: true
  alloy:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    configMap:
      # alloy.configMap.content relabels Kubernetes metadata into Loki labels.
      # The slow-query alert depends on PostgreSQL logs arriving as
      # {namespace="<release namespace>", app="postgresql", container="postgresql"}.
      # That is stable in this chart because the Bitnami PostgreSQL pods keep
      # app.kubernetes.io/name=postgresql and their primary container name=postgresql
      # unless the subchart labels or relabel rules are intentionally changed.
      content: |-
        logging {
          level  = "info"
          format = "logfmt"
        }

        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "platform_pods" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            action        = "keep"
            regex         = "{{ .Release.Namespace }}"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_phase"]
            action        = "keep"
            regex         = "Running"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
            target_label  = "component"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_controller_kind"]
            target_label  = "workload_kind"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_controller_name"]
            target_label  = "workload"
          }
        }

        loki.source.kubernetes "platform_pods" {
          targets    = discovery.relabel.platform_pods.output
          forward_to = [loki.write.default.receiver]
        }

        loki.write "default" {
          endpoint {
            url = "http://{{ if contains "loki" .Release.Name }}{{ .Release.Name }}{{ else }}{{ printf "%s-loki" .Release.Name }}{{ end }}.{{ .Release.Namespace }}.svc.cluster.local:3100/loki/api/v1/push"
          }
        }
