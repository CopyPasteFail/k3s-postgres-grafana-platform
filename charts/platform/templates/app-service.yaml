apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform.app.fullname" . }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    {{- include "platform.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.app.service.type }}
  selector:
    {{- include "platform.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.app.service.port }}
      targetPort: http
