apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform.app.fullname" . }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    {{- include "platform.selectorLabels" . | nindent 4 }}
    platform.example.io/tier: workload
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      {{- include "platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "platform.labels" . | nindent 8 }}
        {{- include "platform.selectorLabels" . | nindent 8 }}
        platform.example.io/tier: workload
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: {{ printf "%s:%s" .Values.app.image.repository .Values.app.image.tag | quote }}
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.containerPort }}
          envFrom:
            - configMapRef:
                name: {{ include "platform.app.configmapName" . }}
            - secretRef:
                name: {{ include "platform.app.secretName" . }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform.postgresql.secretName" . }}
                  key: {{ include "platform.postgresql.userPasswordKey" . }}
          {{- with .Values.app.extraEnv }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
