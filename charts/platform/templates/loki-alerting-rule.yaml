{{- $slowQueryAlert := .Values.monitoring.slowQueryAlert -}}
{{- if and .Values.loki.enabled .Values.loki.ruler.enabled $slowQueryAlert.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform.loki.ruleConfigmapName" . }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    loki_rule: "1"
  annotations:
    k8s-sidecar-target-directory: /rules
data:
  postgresql-slow-query-alert.yaml: |
    groups:
      - name: postgresql-slow-query-log-alerts
        interval: 1m
        rules:
          - alert: PostgreSQLSlowQueryBurst
            # Label contract:
            # - Alloy maps the pod namespace to the Loki label namespace
            # - Alloy maps app.kubernetes.io/name=postgresql to app="postgresql"
            # - Alloy maps the PostgreSQL container name to container="postgresql"
            # This chart relies on those stable labels from the Bitnami PostgreSQL StatefulSet.
            expr: |
              sum(
                count_over_time(
                  {namespace="{{ .Release.Namespace }}", app="postgresql", container="postgresql"} |= "duration:" |= "statement:" [{{ $slowQueryAlert.window }}]
                )
              ) > {{ $slowQueryAlert.threshold }}
            for: {{ $slowQueryAlert.for }}
            labels:
              severity: warning
              service: postgresql
            annotations:
              summary: PostgreSQL logged repeated slow SQL statements
              description: More than {{ $slowQueryAlert.threshold }} SQL statements slower than one second were logged within {{ $slowQueryAlert.window }}.
{{- end }}
