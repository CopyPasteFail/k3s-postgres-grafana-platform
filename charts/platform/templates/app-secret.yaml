apiVersion: v1
kind: Secret
metadata:
  name: {{ include "platform.app.secretName" . }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    {{- include "platform.selectorLabels" . | nindent 4 }}
type: Opaque
{{- $secretData := dict -}}
{{- range $key, $value := .Values.app.secretEnv }}
{{- $_ := set $secretData $key $value -}}
{{- end }}
{{- if .Values.app.secrets.databasePassword }}
{{- $_ := set $secretData "POSTGRES_PASSWORD" .Values.app.secrets.databasePassword -}}
{{- end }}
{{- if $secretData }}
stringData:
  {{- range $key, $value := $secretData }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- else }}
stringData: {}
{{- end }}
